services:
  postgres:
    image: postgres:16-alpine
    container_name: lh-postgres
    environment:
      POSTGRES_DB: local_hands
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: lh-backend
    env_file:
      - ../.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@postgres:5432/local_hands
    ports:
      - "8000:8000"
    depends_on:
      - postgres

  web-app:
    build:
      context: ../web-app
      dockerfile: Dockerfile
    container_name: lh-web
    env_file:
      - ../.env
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mobile-app:
    build:
      context: ../mobile-app
      dockerfile: Dockerfile
    container_name: lh-mobile
    env_file:
      - ../.env
    ports:
      - "8081:8081"
    depends_on:
      - backend

volumes:
  postgres_data:
