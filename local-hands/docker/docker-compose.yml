services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ../.env

  web-app:
    build:
      context: ../web-app
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - ../.env
    depends_on:
      - backend

  mobile-app:
    build:
      context: ../mobile-app
      dockerfile: Dockerfile
    ports:
      - "8081:8081"
    env_file:
      - ../.env
    depends_on:
      - backend
